name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        run: npm run test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          npx allure generate allure-results --clean -o allure-report
         

   

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
         name: test-results
         path: test-results/

  

      - name: Checkout GitHub Pages branch
        uses: actions/checkout@v4
        with:
         ref: gh-pages
         path: gh-pages

      - name: Load Allure history
        run: |
         git clone --depth 1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
         if [ -d "gh-pages/allure-history" ]; then
         cp -r gh-pages/allure-history ./allure-history
         fi

      - name: Save Allure history
        run: |
         rm -rf allure-history
         mkdir -p allure-history
         if [ -d "allure-report/history" ]; then
         cp -r allure-report/history/* allure-history/
         fi
  
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: true