name: Playwright Tests

on:
  push:
    branches: [ main, release/v1.1 ]

permissions:
  contents: write

jobs:
  quality-check:
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run type-check  

      - name: Install Playwright Browsers
        run: npx playwright install

      - name: Run Playwright tests
        run: npm run test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
           playwright-report/
           test-results/

      - name: Install Allure
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report

      - name: Create run folder
        run: |
          $runId = "${{ github.run_number }}"

          New-Item -ItemType Directory -Force -Path "publish/run-$runId" | Out-Null
          Copy-Item -Recurse -Force "allure-report/*" "publish/run-$runId"

          New-Item -ItemType Directory -Force -Path "publish/latest" | Out-Null
          Copy-Item -Recurse -Force "allure-report/*" "publish/latest"

          @"
          <!DOCTYPE html>
          <html>
          <head>
          <meta http-equiv="refresh" content="0; url=latest/" />
          <title>Redirecting...</title>
          </head>
          <body>
          <p>Redirecting to latest test report...</p>
          </body>
          </html>
          "@ | Set-Content -Path "publish/index.html"

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish
          publish_branch: gh-pages
          keep_files: true
          force_orphan: false
